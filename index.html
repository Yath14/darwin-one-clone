<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dharwin One</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ==========================
         HEADER
    =========================== -->

    <header class="navbar">
        <div class="nav-container">

            <!-- Logo -->
            <a href="#" class="logo">
                <img src="assets/images/dl.png" alt="Dharwin One Logo">
            </a>

            <!-- Navigation -->
            <nav class="nav-links">
                <a href="#">Product</a>
                <a href="#">Agents</a>
                <a href="#">Solutions</a>
                <a href="#">Resources</a>
                <a href="#">Pricing</a>
            </nav>

            <!-- CTA Button -->
            <a href="#" class="demo-btn">
                Book a demo
                <span>→</span>
            </a>

        </div>
    </header>

    <!-- ==========================
         MAIN CONTENT
    =========================== -->

    <main>
        <!-- Add your website sections here -->
    </main>

    <!-- ==========================
         FOOTER
    =========================== -->

    <footer class="footer">

        <div class="footer-container">

            <!-- Column 1 -->
            <div class="footer-column">
                <h4>Our commitments</h4>

                <a href="#">Our story</a>
                <a href="#">Careers</a>
                <a href="#">For businesses</a>
                <a href="#">Our materials</a>
            </div>

            <!-- Column 2 -->
            <div class="footer-column">
                <h4>Practical information</h4>

                <a href="#">Legal notices</a>
                <a href="#">Privacy policy</a>
                <a href="#">Refunds</a>
                <a href="#">Terms and conditions</a>
            </div>

            <!-- Column 3 -->
            <div class="footer-column payment-column">
                <h4>Payment</h4>

                <div class="payment-icons">
                    <img src="assets/images/master.jpg" alt="Mastercard">
                    <img src="assets/images/ChatGPT Image Jun 6, 2026, 10_57_39 AM.png" alt="Google Pay">
                    <img src="assets/images/ap.jpg" alt="Apple Pay">
                    <img src="assets/images/amx.jpg" alt="American Express">
                    <img src="assets/images/pp.png" alt="PayPal">
                    <img src="assets/images/visa.jpg" alt="Visa">
                </div>
            </div>

        </div>

        <!-- Social Icons -->

        <div class="social-icons">

            <a href="#" aria-label="Facebook">
                <img src="assets/images/Fb-3.jpg" alt="">
            </a>

            <a href="#" aria-label="Instagram">
                <img src="assets/images/int.jpg" alt="">
            </a>

            <a href="#" aria-label="Pinterest">
                <img src="assets/images/pinterest.png" alt="">
            </a>

            <a href="#" aria-label="YouTube">
                <img src="assets/images/youtube.png" alt="">
            </a>

            <a href="#" aria-label="Twitter">
                <img src="assets/images/twitter.png" alt="">
            </a>

            <a href="#" aria-label="LinkedIn">
                <img src="assets/images/linkedin.png" alt="">
            </a>

        </div>

    </footer>

</body>
</html>
